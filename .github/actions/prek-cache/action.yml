name: "Steps to setup prek hooks cache"

inputs:
  python-version:
    description: "Python version to set up"
    required: true

runs:
  using: "composite"
  steps:
    - uses: actions/cache@v5
      name: Cache prek hooks
      with:
        path: ~/.cache/prek/
        key: >
          ${{ format('prek-{0}-{1}',
          inputs.python-version,
          hashFiles('.pre-commit-config.yaml')
          ) }}
        restore-keys: |
          prek-${{ inputs.python-version }}-
          prek-
