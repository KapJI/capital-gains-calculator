name: CI

on:
  push:
    branches:
      - main
  pull_request:

env:
  PYTHON_VERSION: "3.12"

jobs:
  pre-commit:
    name: Pre-commit
    runs-on: ubuntu-latest
    steps:
      - name: Check out the repository
        uses: actions/checkout@v6

      - name: Prepare and install deps
        uses: ./.github/actions/install-deps
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Setup prek cache
        uses: ./.github/actions/prek-cache
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Run prek on all files
        run: |
          uvx prek run --all-files --show-diff-on-failure --color=always

      - name: Run python-typing-update
        run: |
          uvx prek run --hook-stage manual python-typing-update --all-files --show-diff-on-failure --color=always

  markdown-link-check:
    name: Markdown link check
    runs-on: ubuntu-latest
    steps:
      - name: Check out the repository
        uses: actions/checkout@v6

      - name: Prepare and install deps
        uses: ./.github/actions/install-deps
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Setup prek cache
        uses: ./.github/actions/prek-cache
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Run markdown-link-check
        run: |
          uvx prek run --hook-stage manual markdown-link-check --all-files --show-diff-on-failure --color=always

  docker-build:
    name: Docker build
    runs-on: ubuntu-latest
    steps:
      - name: Check out the repository
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build image
        uses: docker/build-push-action@v7
        with:
          context: .
          tags: local/cgt-calc:test
          load: true
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Run pytest inside container
        run: |
          docker run --rm -e ENABLE_PDFLATEX=1 local/cgt-calc:test -lc "cd /build && uv run pytest -q"
